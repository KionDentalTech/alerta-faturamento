# ----------------------------------------------------------
#  CAMINHOS DOS ARQUIVOS
#  Share de rede: \\kion-ad\KionStorage\ANALYTICS\dados
#  No Docker os arquivos ficam em /app/dados/ (volume montado)
#  Localmente ficam em C:\KionDental\dados\
#  Sempre salve os exports do ERP com esses nomes exatos:
# ----------------------------------------------------------
caminhos:
  clientes:       dados/clientes.xlsx
  producao_2025:  dados/producao_2025.xlsx
  producao_2026:  dados/producao_2026.xlsx
  logs:           saidas/logs

# ----------------------------------------------------------
#  THRESHOLDS DE RISCO
#  Ajuste conforme experiência do time
# ----------------------------------------------------------
thresholds:
  alto_queda_pct:    20    # queda >= 20% vs média 12M
  alto_meses_min:     2    # E >= 2 meses consecutivos em queda
  medio_queda_pct:   10    # queda >= 10% vs média 12M

# ----------------------------------------------------------
#  TABELAS DE PREÇO PRIORITÁRIAS (e-mail do gestor)
#  Clientes dessas tabelas sempre aparecem no consolidado
# ----------------------------------------------------------
tabelas_prioritarias:
  - ELITE (2026)
  - PREMIUM (2026)
  - FRANQUIA SELECT (2026)
  - CLINICAS INTELIGENTES (2026)
  - KLC (2026)
