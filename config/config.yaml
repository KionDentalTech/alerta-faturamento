emails_teste:
  - gabriel.araujo@kiondental.tech
  - fabio.merlo@kiondental.tech

# ----------------------------------------------------------
#  SMTP — Servidor de envio
#  Para Office 365 use: smtp.office365.com / porta 587
#  Preencha usuario e senha do analytics@kiondental.tech
# ----------------------------------------------------------
smtp:
  servidor: smtp.office365.com
  porta: 587
  usuario: analytics@kiondental.tech
  senha: "PREENCHA_AQUI"

